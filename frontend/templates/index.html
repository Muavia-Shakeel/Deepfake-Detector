<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card { max-width: 600px; margin: 3rem auto; }
        .result-box {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .result-box.fake { background-color: #f8d7da; border: 1px solid #f5c6cb; }
        .result-box.real { background-color: #d4edda; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Hybrid Ensemble Deepfake Detector</h3>
                <p class="text-muted text-center">FYP, Hazara University</p>
                <form id="upload-form">
                    <div class="mb-3">
                        <label for="file-input" class="form-label">Upload Image or Video</label>
                        <input class="form-control" type="file" id="file-input" accept="image/*,video/*">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Analyze</button>
                    </div>
                </form>

                <div id="spinner" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p>Analyzing... please wait.</p>
                </div>

                <div id="result" class="result-box">
                    <h5 class="result-title"></h5>
                    <p class="result-prob"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
